<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEKYA · admin panel</title>
  <!-- Dexie.js -->
  <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #f5f9f7;
      color: #1e3a2f;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #1e3a2f;
    }

    .logo {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1e3a2f;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-bar label {
      font-weight: 600;
      color: #1e3a2f;
    }

    .role-filter {
      padding: 0.5rem 2.5rem 0.5rem 1rem;
      border: 1.5px solid #1e3a2f;
      background: white;
      color: #1e3a2f;
      font-weight: 500;
      border-radius: 40px;
      cursor: pointer;
    }

    .table-wrapper {
      background: white;
      border-radius: 24px;
      border: 1px solid #d0e0d6;
      overflow-x: auto;
      box-shadow: 0 8px 20px rgba(10, 61, 42, 0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th {
      background: #eaf3ee;
      color: #1e3a2f;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 1.2rem 1rem;
      text-align: left;
      border-bottom: 2px solid #1e3a2f;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid #d0e0d6;
      color: #1e3a2f;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background-color: #f6fbf8;
    }

    .delete-btn {
      background: transparent;
      border: 1.5px solid #b91c1c;
      color: #b91c1c;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .delete-btn:hover {
      background: #b91c1c;
      color: white;
    }

    .empty-message {
      text-align: center;
      padding: 3rem;
      color: #1e3a2f;
      opacity: 0.7;
      font-style: italic;
    }

    .role-badge {
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #eaf3ee;
      color: #1e3a2f;
      border: 1px solid #1e3a2f;
    }

    .stats-note {
      margin-top: 1.5rem;
      text-align: right;
      color: #1e3a2f;
      opacity: 0.7;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <nav class="navbar">
      <span class="logo">BEKYA · admin</span>
    </nav>

    <div class="filter-bar">
      <label for="roleFilter">Filter by role:</label>
      <select id="roleFilter" class="role-filter">
        <option value="all">All users</option>
        <option value="seller">Sellers</option>
        <option value="outlet">Outlets</option>
        <option value="admin">Admins</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table id="userTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Seller KG</th>
            <th>Seller Points</th>
            <th>Outlet KG</th>
            <th>Outlet Points</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="empty-message">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="stats-note" id="statsNote"></div>
  </div>

  <script>
    (async function() {
      // ────────────────────────────────────────────────
      //               Open Databases
      // ────────────────────────────────────────────────
      const dbUsers = new Dexie('BEKYADatabase');
      dbUsers.version(1).stores({ Users: '++id, name, phone, role, weight, points' });

      const dbOutlet = new Dexie('RecycleOutletDB');
      dbOutlet.version(2).stores({ records: '++id, sellerName, phone, materialType, weight, timestamp, points, userId' });

      await Promise.all([dbUsers.open(), dbOutlet.open()]);

      // ────────────────────────────────────────────────
      //               DOM Elements
      // ────────────────────────────────────────────────
      const tbody = document.getElementById('tableBody');
      const roleFilter = document.getElementById('roleFilter');
      const statsNote = document.getElementById('statsNote');

      // ────────────────────────────────────────────────
      //        Helper: Get seller materials from localStorage
      // ────────────────────────────────────────────────
      function getSellerMaterials() {
        const stored = localStorage.getItem('materials');
        return stored ? JSON.parse(stored) : [];
      }

      // ────────────────────────────────────────────────
      //               Load & Display Users
      // ────────────────────────────────────────────────
      async function loadUsers() {
        const users = await dbUsers.Users.toArray();
        const sellerMaterials = getSellerMaterials();
        const outletRecords = await dbOutlet.records.toArray();

        // ── Build totals per user ───────────────────────────────
        const sellerMap = new Map(); // userId (number) → {kg, points}
        sellerMaterials.forEach(m => {
          const userId = Number(m.userId);
          if (userId && !isNaN(userId)) {
            if (!sellerMap.has(userId)) sellerMap.set(userId, { kg: 0, points: 0 });
            const data = sellerMap.get(userId);
            data.kg    += Number(m.weight)  || 0;
            data.points += Number(m.points) || 0;
          }
        });

        const outletMap = new Map();
        outletRecords.forEach(r => {
          const userId = Number(r.userId);
          if (userId && !isNaN(userId)) {
            if (!outletMap.has(userId)) outletMap.set(userId, { kg: 0, points: 0 });
            const data = outletMap.get(userId);
            data.kg    += Number(r.weight)  || 0;
            data.points += Number(r.points) || 0;
          }
        });

        // ── Combine data ────────────────────────────────────────
        const userList = users.map(u => {
          const seller = sellerMap.get(u.id) || { kg: 0, points: 0 };
          const outlet = outletMap.get(u.id) || { kg: 0, points: 0 };
          return {
            id: u.id,
            name: u.name || 'غير معروف',
            phone: u.phone || 'غير محدد',
            role: u.role || 'غير معروف',
            sellerKg: seller.kg,
            sellerPoints: seller.points,
            outletKg: outlet.kg,
            outletPoints: outlet.points
          };
        });

        // Apply filter
        const filter = roleFilter.value;
        let filtered = userList;
        if (filter !== 'all') {
          filtered = userList.filter(u => u.role === filter);
        }

        // Render
        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="empty-message">ما فيش مستخدمين بهذا الفلتر</td></tr>`;
          statsNote.innerText = '';
          return;
        }

        let html = '';
        filtered.forEach(u => {
          const isSeller = u.role === 'seller';
          const isOutlet = u.role === 'outlet';

          html += `
            <tr>
              <td><strong>${escapeHtml(u.name)}</strong></td>
              <td>${escapeHtml(u.phone)}</td>
              <td><span class="role-badge">${escapeHtml(u.role)}</span></td>
              <td>${isOutlet ? '—' : (u.sellerKg).toFixed(2) + ' kg'}</td>
              <td>${isOutlet ? '—' : u.sellerPoints.toFixed(0)}</td>
              <td>${isSeller ? '—' : (u.outletKg).toFixed(2) + ' kg'}</td>
              <td>${isSeller ? '—' : u.outletPoints.toFixed(0)}</td>
              <td>
                <button class="delete-btn" data-id="${u.id}" data-name="${escapeHtml(u.name)}">
                  <i class="fas fa-trash-alt"></i> حذف
                </button>
              </td>
            </tr>`;
        });

        tbody.innerHTML = html;

        // Stats
        const totalSellerKg = filtered.reduce((sum, u) => sum + u.sellerKg, 0);
        const totalOutletPoints = filtered.reduce((sum, u) => sum + u.outletPoints, 0);
        statsNote.innerText = `عرض ${filtered.length} مستخدم · إجمالي كيلو (بائعين): ${totalSellerKg.toFixed(2)} kg · إجمالي نقاط (منافذ): ${totalOutletPoints.toFixed(0)}`;

        // Attach delete events
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const userId = Number(btn.dataset.id);
            const userName = btn.dataset.name;
            if (!confirm(`هتحذف المستخدم "${userName}" وكل بياناته؟ العملية دي مش هترجع تاني.`)) return;
            await deleteUser(userId);
            await loadUsers();
          });
        });
      }

      // ────────────────────────────────────────────────
      //               Delete User Completely
      // ────────────────────────────────────────────────
      async function deleteUser(userId) {
        // 1. حذف من جدول Users
        await dbUsers.Users.delete(userId);

        // 2. حذف المواد اللي جمعها (Seller) من localStorage
        const materials = getSellerMaterials();
        const remainingMaterials = materials.filter(m => Number(m.userId) !== userId);
        localStorage.setItem('materials', JSON.stringify(remainingMaterials));

        // 3. حذف السجلات اللي سجلها (Outlet)
        await dbOutlet.records.where('userId').equals(userId).delete();

        // ملحوظة: لو عندك localStorage 'users' للـ login، ممكن تحتاج تضيف حذف هناك كمان
        // لكن حالياً معظم الأنظمة بتعتمد على Dexie id مش localStorage users array
      }

      // ────────────────────────────────────────────────
      //               HTML Escape
      // ────────────────────────────────────────────────
      function escapeHtml(unsafe) {
        if (unsafe == null) return '';
        return String(unsafe)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      // ────────────────────────────────────────────────
      //               Event Listeners & Init
      // ────────────────────────────────────────────────
      roleFilter.addEventListener('change', loadUsers);
      await loadUsers();

      // Font Awesome (اختياري)
      const fa = document.createElement('link');
      fa.rel = 'stylesheet';
      fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css';
      document.head.appendChild(fa);
    })();
  </script>
</body>
</html>
