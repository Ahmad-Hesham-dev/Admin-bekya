<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEKYA · admin panel (fixed sums)</title>
  <!-- Dexie.js -->
  <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #f5f9f7;
      color: #1e3a2f;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #1e3a2f;
    }

    .logo {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1e3a2f;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-bar label {
      font-weight: 600;
      color: #1e3a2f;
    }

    .role-filter {
      padding: 0.5rem 2.5rem 0.5rem 1rem;
      border: 1.5px solid #1e3a2f;
      background: white;
      color: #1e3a2f;
      font-weight: 500;
      border-radius: 40px;
      cursor: pointer;
    }

    .table-wrapper {
      background: white;
      border-radius: 24px;
      border: 1px solid #d0e0d6;
      overflow-x: auto;
      box-shadow: 0 8px 20px rgba(10, 61, 42, 0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th {
      background: #eaf3ee;
      color: #1e3a2f;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 1.2rem 1rem;
      text-align: left;
      border-bottom: 2px solid #1e3a2f;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid #d0e0d6;
      color: #1e3a2f;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background-color: #f6fbf8;
    }

    .delete-btn {
      background: transparent;
      border: 1.5px solid #b91c1c;
      color: #b91c1c;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .delete-btn:hover {
      background: #b91c1c;
      color: white;
    }

    .empty-message {
      text-align: center;
      padding: 3rem;
      color: #1e3a2f;
      opacity: 0.7;
      font-style: italic;
    }

    .role-badge {
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #eaf3ee;
      color: #1e3a2f;
      border: 1px solid #1e3a2f;
    }

    .stats-note {
      margin-top: 1.5rem;
      text-align: right;
      color: #1e3a2f;
      opacity: 0.7;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <nav class="navbar">
      <span class="logo">BEKYA · admin</span>
    </nav>

    <div class="filter-bar">
      <label for="roleFilter">Filter by role:</label>
      <select id="roleFilter" class="role-filter">
        <option value="all">All users</option>
        <option value="seller">Sellers</option>
        <option value="outlet">Outlets</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table id="userTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Seller KG</th>
            <th>Seller points</th>
            <th>Outlet KG</th>
            <th>Outlet points</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="empty-message">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="stats-note" id="statsNote"></div>
  </div>

  <script>
    (async function() {
      // ----- open both databases -----
      const dbUsers = new Dexie('BEKYADatabase');
      dbUsers.version(1).stores({ Users: '++id, name, phone, role' });

      const dbOutlet = new Dexie('RecycleOutletDB');
      // ensure records store has userId index
      dbOutlet.version(2).stores({ records: '++id, sellerName, phone, materialType, materialweight, timestamp, materialpoints, userId' });

      await Promise.all([dbUsers.open(), dbOutlet.open()]);

      const tbody = document.getElementById('tableBody');
      const roleFilter = document.getElementById('roleFilter');
      const statsNote = document.getElementById('statsNote');

      // ----- helper: get seller materials from localStorage (parse as numbers later) -----
      function getSellerMaterials() {
        const stored = localStorage.getItem('materials');
        return stored ? JSON.parse(stored) : [];
      }

      // ----- load and display users with CORRECT numeric sums -----
      async function loadUsers() {
        const users = await dbUsers.Users.toArray();
        const sellerMaterials = getSellerMaterials(); 
        const outletRecords = await dbOutlet.records.toArray();

        // --- build seller sums with explicit number parsing ---
        const sellerMap = new Map(); // userId -> { kg, points }
        sellerMaterials.forEach(m => {
          if (m.userId) {
            const id = m.userId;
            if (!sellerMap.has(id)) sellerMap.set(id, { kg: 0, points: 0 });
            const data = sellerMap.get(id);
            
            // SAFE NUMERIC PARSING: handle strings, nulls, undefined
            const weight = parseFloat(m.weight) || 0;  // parseFloat('') → NaN → 0,  '0' → 0
            const points = parseFloat(m.points) || 0;
            
            data.kg += weight;
            data.points += points;
          }
        });

        // --- build outlet sums with explicit number parsing ---
        const outletMap = new Map(); // userId -> { kg, points }
        outletRecords.forEach(r => {
          if (r.userId) {
            const id = r.userId;
            if (!outletMap.has(id)) outletMap.set(id, { kg: 0, points: 0 });
            const data = outletMap.get(id);
            
            const weight = parseFloat(r.weight) || 0;
            const points = parseFloat(r.points) || 0;
            
            data.kg += weight;
            data.points += points;
          }
        });

        // combine with user list
        const userList = users.map(u => {
          const seller = sellerMap.get(u.id) || { kg: 0, points: 0 };
          const outlet = outletMap.get(u.id) || { kg: 0, points: 0 };
          return {
            id: u.id,
            name: u.name,
            phone: u.phone,
            role: u.role,
            sellerKg: seller.kg,
            sellerPoints: seller.points,
            outletKg: outlet.kg,
            outletPoints: outlet.points
          };
        });

        // apply role filter
        const filter = roleFilter.value;
        const filtered = filter === 'all' ? userList : userList.filter(u => u.role === filter);

        // render table
        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="empty-message">No users found</td></tr>`;
          statsNote.innerText = '';
          return;
        }

        let html = '';
        filtered.forEach(u => {
          const isSeller = u.role === 'seller';
          const isOutlet = u.role === 'outlet';
          
          // Format numbers: we want to display them cleanly (whole numbers or decimals)
          // toFixed(2) removes floating point artifacts, but we keep as is for simplicity.
          // We'll just append " g" for kg columns.
          html += `<tr>
            <td><strong>${escapeHtml(u.name)}</strong></td>
            <td>${escapeHtml(u.phone)}</td>
            <td><span class="role-badge">${escapeHtml(u.role)}</span></td>
            <td>${isOutlet ? '' : u.sellerKg + ' g'}</td>
            <td>${isOutlet ? '' : u.sellerPoints}</td>
            <td>${isSeller ? '' : u.outletKg + ' g'}</td>
            <td>${isSeller ? '' : u.outletPoints}</td>
            <td>
              <button class="delete-btn" data-id="${u.id}" data-name="${escapeHtml(u.name)}">
                <i class="fas fa-trash-alt"></i> Delete
              </button>
            </td>
          </tr>`;
        });
        tbody.innerHTML = html;

        // optional stats (using filtered sums – keep as is but note that seller kg and outlet points totals are shown)
        const totalSellerKg = filtered.reduce((s,u) => s + u.sellerKg, 0);
        const totalOutletPoints = filtered.reduce((s,u) => s + u.outletPoints, 0);
        statsNote.innerText = `Showing ${filtered.length} user(s) · Total KG (seller): ${totalSellerKg} g · Total points (outlet): ${totalOutletPoints}`;

        // attach delete events
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const userId = Number(btn.dataset.id);
            const userName = btn.dataset.name;
            if (!confirm(`Delete user "${userName}" and all their data? This cannot be undone.`)) return;
            await deleteUser(userId);
            await loadUsers(); // refresh
          });
        });
      }

      // ----- delete user completely (unchanged logic, but uses same getSellerMaterials) -----
      async function deleteUser(userId) {
        // 1. remove from Users table
        await dbUsers.Users.delete(userId);

        // 2. remove from localStorage 'users' array – we skip because no userId stored there (as original)
        // 3. remove seller materials (from localStorage) that belong to this user
        const materials = getSellerMaterials(); // uses same helper
        const newMaterials = materials.filter(m => m.userId !== userId);
        localStorage.setItem('materials', JSON.stringify(newMaterials));

        // 4. remove outlet records (from Dexie)
        await dbOutlet.records.where('userId').equals(userId).delete();

        // 5. (optional profile keys not touched)
      }

      // ----- escape HTML for safety -----
      function escapeHtml(unsafe) {
        if (!unsafe) return unsafe;
        return String(unsafe)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      // ----- filter change -----
      roleFilter.addEventListener('change', loadUsers);

      // ----- initial load -----
      await loadUsers();

      // Font Awesome for icons (optional but nice)
      const fa = document.createElement('link');
      fa.rel = 'stylesheet';
      fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
      document.head.appendChild(fa);
    })();
  </script>
</body>
</html>
